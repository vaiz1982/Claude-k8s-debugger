image:
  repository: vaiz82/claude-k8s-debugger
  tag: "0.1.0"
  pullPolicy: IfNotPresent

namespace: claude-tools

# Scope of the ClusterRole. Keep this read-only unless you deliberately
# want the agent to be able to change cluster state.
rbac:
  readOnly: true
  # namespaces the agent is allowed to inspect; empty list = cluster-wide (via ClusterRole)
  watchNamespaces: []

# "oauth"  -> interactive browser login (uses your Claude.ai Pro/Max subscription),
#             session persisted on a PVC so it survives pod restarts.
# "apikey" -> headless auth via ANTHROPIC_API_KEY (separate per-token billing).
authMode: oauth

# Only used when authMode: apikey. Do NOT put the real key in values.yaml / git —
# pass it with --set at install time, or manage it with an external secret operator
# and set secret.create: false below.
secret:
  create: true
  name: claude-api-key
  anthropicApiKey: ""

# Persists ~/.claude (OAuth session/config) across pod restarts.
# Only relevant when authMode: oauth.
persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""   # "" = cluster default StorageClass

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

networkPolicy:
  enabled: true
  # Claude Code needs to reach the Anthropic API
  allowedEgressCIDRs:
    - 0.0.0.0/0   # tighten to Anthropic's published IP ranges if you need strict egress control

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

replicaCount: 1

# Set to true for single-node test clusters where the only node is the
# control-plane (kubeadm taints it NoSchedule by default). Set to false
# once you have dedicated worker nodes.
tolerateControlPlane: true
