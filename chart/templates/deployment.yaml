apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-k8s-debugger
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: claude-k8s-debugger
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claude-k8s-debugger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claude-k8s-debugger
    spec:
      serviceAccountName: claude-k8s-debugger
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: claude
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # keep the pod alive for `kubectl exec` sessions; run claude interactively via exec
        command: ["sleep", "infinity"]
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        envFrom:
        - secretRef:
            name: {{ .Values.secret.name }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
