apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-k8s-debugger-{{ .Values.namespace }}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services", "endpoints", "configmaps", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
{{- if not .Values.rbac.readOnly }}
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]  # e.g. to bounce a stuck pod
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-k8s-debugger-{{ .Values.namespace }}
subjects:
- kind: ServiceAccount
  name: claude-k8s-debugger
  namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: claude-k8s-debugger-{{ .Values.namespace }}
  apiGroup: rbac.authorization.k8s.io
