apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-k8s-debugger-argocd-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vaiz1982/Claude-k8s-debugger.git
    targetRevision: main
    path: chart
    helm:
      valueFiles:
        - values-argocd-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-tools-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
